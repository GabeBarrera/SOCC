<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Commander — Office Tower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f2f2; --ink:#201f1d; --accent:#b68235; --accentDeep:#8a5f22;
    --divider:#d9d5cf; --paper:#faf9f7; --mute:#6b665f; --slab:#3a3733;
    --salmon:#b0524f; --green:#5f7d63; --gold:#b68235;
  }
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:'Lora',Georgia,serif;overflow:hidden;}
  canvas{display:block;}
  a{color:var(--accent);} a:hover{color:var(--accentDeep);}
  *{box-sizing:border-box;}

  #hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:baseline;
    gap:18px;padding:12px 22px;pointer-events:none;z-index:5;
    border-bottom:1px solid var(--divider);background:rgba(243,242,242,.9);}
  #hud h1{margin:0;font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;
    font-size:22px;letter-spacing:.04em;}
  #hud .sub{margin:0;font-size:12px;font-style:italic;color:var(--mute);max-width:340px;}
  #hud .spacer{flex:1;}
  #hud .status{display:flex;align-items:center;gap:14px;pointer-events:auto;flex-wrap:wrap;justify-content:flex-end;}
  #hud .stat{font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--slab);white-space:nowrap;}
  #hud .stat b{color:var(--accentDeep);font-weight:700;}
  #chainpips{display:flex;gap:5px;}
  #chainpips .pip{width:15px;height:15px;border:1.5px solid var(--divider);border-radius:3px;background:transparent;}
  .topbtn{pointer-events:auto;font-family:'Cormorant Garamond',serif;font-size:14px;
    letter-spacing:.06em;text-transform:uppercase;padding:6px 13px;background:transparent;
    color:var(--accentDeep);border:1px solid var(--accent);border-radius:6px;cursor:pointer;
    text-decoration:none;transition:background .15s;}
  .topbtn:hover{background:rgba(182,130,53,.12);}
  .topbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  #prompt{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:5;
    display:none;align-items:center;gap:10px;padding:9px 18px;background:rgba(32,31,29,.9);
    color:var(--paper);border-radius:30px;font-size:14px;box-shadow:0 6px 24px rgba(0,0,0,.28);
    pointer-events:none;}
  #prompt .key{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;
    padding:0 6px;border-radius:5px;background:var(--accent);color:#241a08;font-family:'Cormorant Garamond',serif;
    font-weight:700;font-size:13px;}
  #endTurnBtn{position:fixed;right:26px;bottom:26px;z-index:6;display:none;
    font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:.06em;
    padding:12px 26px;background:var(--paper);color:var(--accentDeep);border:1.5px solid var(--accent);
    border-radius:8px;cursor:pointer;box-shadow:0 8px 26px rgba(0,0,0,.22);}
  #endTurnBtn:hover{background:rgba(182,130,53,.1);}

  /* pull-out kill-chain tab */
  #kcDrawer{position:fixed;top:88px;right:0;z-index:8;display:flex;align-items:flex-start;
    transform:translateX(300px);transition:transform .32s cubic-bezier(.3,.8,.3,1);}
  #kcDrawer.open{transform:translateX(0);}
  #kcHandle{align-self:flex-start;margin-top:8px;writing-mode:vertical-rl;
    background:var(--accent);color:#241a08;border:none;padding:18px 9px;cursor:pointer;
    font-family:'Cormorant Garamond',serif;font-weight:700;letter-spacing:.2em;font-size:14px;
    border-radius:9px 0 0 9px;box-shadow:-4px 4px 16px rgba(0,0,0,.2);text-transform:uppercase;}
  #kcHandle:hover{background:var(--accentDeep);color:#fff;}
  #kcPanel{width:300px;max-height:calc(100vh - 108px);overflow:auto;background:var(--paper);
    border:1px solid var(--divider);border-left:3px solid var(--accent);
    padding:16px 16px 20px;box-shadow:-10px 8px 34px rgba(0,0,0,.16);}
  .kc-h{font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--accentDeep);margin-bottom:14px;}
  .kc-card{border:1px solid var(--divider);border-radius:11px;padding:13px 15px;margin-bottom:11px;background:#fff;}
  .kc-card .cc{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.13em;
    text-transform:uppercase;display:flex;gap:8px;align-items:center;}
  .kc-dots{color:#c9c3b8;letter-spacing:4px;margin:9px 0 6px;font-size:15px;}
  .kc-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;line-height:1.1;margin:6px 0 3px;}
  .kc-sub{font-size:12px;color:var(--mute);font-style:italic;}

  #menuWrap{position:relative;pointer-events:auto;}
  #hamMenu{position:absolute;top:calc(100% + 6px);right:0;min-width:150px;background:var(--paper);
    border:1px solid var(--divider);border-radius:9px;box-shadow:0 12px 30px rgba(0,0,0,.2);
    padding:6px;display:none;flex-direction:column;gap:2px;z-index:9;}
  #hamMenu.open{display:flex;}
  #hamMenu button{font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:.04em;
    text-align:left;padding:9px 12px;background:transparent;border:none;border-radius:6px;color:var(--ink);
    cursor:pointer;}
  #hamMenu button:hover{background:rgba(182,130,53,.12);color:var(--accentDeep);}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:13px 0;border-bottom:1px solid var(--divider);}
  .toggle-row:last-of-type{border-bottom:none;}
  .toggle-row .tl{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;}
  .toggle-row .td{font-size:12.5px;color:var(--mute);line-height:1.4;margin-top:2px;}
  .sw{flex:none;width:52px;height:28px;border-radius:16px;border:1.5px solid var(--divider);
    background:#eceae6;position:relative;cursor:pointer;transition:background .15s,border-color .15s;}
  .sw::after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;
    background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .18s;}
  .sw.on{background:var(--accent);border-color:var(--accent);}
  .sw.on::after{left:26px;}

  #backdrop{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
    padding:24px;background:rgba(32,31,29,.44);backdrop-filter:blur(2px);}
  #modal{width:min(540px,94vw);max-height:88vh;overflow:auto;background:var(--paper);
    border:1px solid var(--divider);border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,.34);
    animation:pop .28s cubic-bezier(.2,.9,.3,1) both;}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
  .m-head{padding:14px 22px;border-bottom:1px solid var(--divider);display:flex;
    align-items:center;justify-content:space-between;gap:12px;}
  .m-kicker{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--accentDeep);}
  .m-body{padding:20px 22px;}
  .m-title{font-family:'Cormorant Garamond',serif;font-size:29px;font-weight:600;line-height:1.12;
    margin:0 0 10px;letter-spacing:.01em;}
  .m-title.sm{font-size:23px;}
  .m-desc{font-size:15.5px;line-height:1.6;color:#38352f;margin:0;}
  .m-desc + .m-desc{margin-top:10px;}
  .aside{margin-top:14px;padding:13px 15px;border-left:3px solid var(--accent);
    background:rgba(182,130,53,.08);font-size:14.5px;line-height:1.55;color:#4a4133;font-style:italic;}
  .aside b{font-style:normal;color:var(--accentDeep);}
  .m-x{background:none;border:none;font-size:22px;line-height:1;color:var(--mute);cursor:pointer;font-family:serif;}
  .m-x:hover{color:var(--ink);}
  .m-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
  .btn{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;letter-spacing:.04em;
    padding:11px 22px;background:transparent;color:var(--accentDeep);border:1.5px solid var(--accent);
    border-radius:8px;cursor:pointer;transition:background .15s;}
  .btn:hover{background:rgba(182,130,53,.12);}
  .btn.primary{background:var(--accent);color:#241a08;}
  .btn.primary:hover{background:var(--accentDeep);color:#fff;}
  .btn.ghost{border-color:var(--divider);color:var(--mute);}
  .btn.ghost:hover{border-color:var(--mute);color:var(--ink);background:transparent;}
  .btn:disabled{opacity:.4;cursor:default;}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .choice{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
  .choice button{display:flex;align-items:center;gap:14px;text-align:left;width:100%;padding:15px 18px;
    background:#fff;border:1px solid var(--divider);border-radius:11px;cursor:pointer;font-family:'Lora',serif;
    transition:border-color .15s,background .15s;}
  .choice button:hover{border-color:var(--accent);background:rgba(182,130,53,.06);}
  .choice .num{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;color:var(--accentDeep);width:34px;text-align:center;}
  .choice .ct{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;line-height:1.1;}
  .choice .cd{font-size:13px;color:var(--mute);line-height:1.45;margin-top:2px;}

  .proc-list{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
  .proc{display:flex;align-items:flex-start;gap:12px;text-align:left;width:100%;
    padding:12px 14px;background:#fff;border:1px solid var(--divider);border-radius:9px;cursor:pointer;
    font-family:'Lora',serif;transition:border-color .15s,background .15s;}
  .proc:hover:not(:disabled){border-color:var(--accent);background:rgba(182,130,53,.06);}
  .proc:disabled{opacity:.5;cursor:default;}
  .proc .pt{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;line-height:1.1;}
  .proc .pd{font-size:12.5px;color:var(--mute);line-height:1.45;margin-top:3px;}
  .proc .pm{margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;white-space:nowrap;}
  .proc .pm.est{color:var(--accentDeep);}
  .proc .pm.no{color:#a8a29a;}
  .proc .lock{margin-left:auto;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--salmon);white-space:nowrap;align-self:center;}
  .field-note{font-size:13px;color:var(--mute);font-style:italic;margin:4px 0 0;}

  .dice{margin:6px auto 4px;width:120px;height:120px;border-radius:20px;display:flex;align-items:center;
    justify-content:center;font-family:'Cormorant Garamond',serif;font-size:58px;font-weight:700;
    background:var(--paper);border:2px solid var(--divider);color:var(--ink);}
  .dice.roll{animation:shake .3s ease infinite;}
  @keyframes shake{0%,100%{transform:rotate(0);}25%{transform:rotate(-6deg);}75%{transform:rotate(6deg);}}
  .dice.win{border-color:var(--green);color:var(--green);}
  .dice.lose{border-color:var(--salmon);color:var(--salmon);}
  .dice-wrap{text-align:center;}
  .dice-math{font-size:15px;color:var(--mute);margin-top:10px;}
  .dice-verdict{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;letter-spacing:.08em;margin-top:4px;}
  .manual{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .manual input{width:70px;font-family:'Cormorant Garamond',serif;font-size:18px;text-align:center;
    padding:8px;background:#fff;border:1.5px solid var(--divider);border-radius:7px;color:var(--ink);}
  .manual input:focus{outline:none;border-color:var(--accent);}

  .slot{border:1px solid var(--divider);border-radius:9px;padding:11px 14px;margin-top:8px;background:#fff;}
  .slot .sc{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;}
  .slot .st{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;line-height:1.1;margin-top:2px;}
  .slot .ss{font-size:12px;color:var(--mute);font-style:italic;margin-top:2px;}
  .log{margin-top:6px;max-height:180px;overflow:auto;border-top:1px solid var(--divider);padding-top:10px;}
  .log .le{font-size:12.5px;line-height:1.5;color:#4a4640;border-left:2px solid var(--divider);padding-left:9px;margin-bottom:7px;}
  .log .le b{color:var(--accentDeep);font-weight:600;}
  .subhead{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--mute);margin:18px 0 2px;}
  .subhead:first-child{margin-top:0;}

  /* ===== mini-games ===== */
  #miniHost{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
    padding:22px;background:rgba(20,19,17,.94);backdrop-filter:blur(3px);}
  .mini-screen{width:min(980px,95vw);height:min(640px,92vh);display:flex;flex-direction:column;
    background:#12141d;color:#dfe4ea;border-radius:12px;border:11px solid #26241f;
    box-shadow:0 0 0 2px #3a3733, 0 30px 70px rgba(0,0,0,.6), inset 0 0 90px rgba(0,0,0,.5);
    overflow:hidden;font-family:'Lora',Georgia,serif;position:relative;}
  .mini-screen::after{content:'';position:absolute;inset:0;pointer-events:none;border-radius:2px;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0 2px,transparent 2px 4px);}
  .mini-bar{display:flex;align-items:center;gap:16px;padding:12px 18px;
    background:#191c26;border-bottom:1px solid #2c3140;flex:none;z-index:2;}
  .mini-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:#c9a24e;}
  .mini-hint{font-size:12.5px;font-style:italic;color:#8b94a6;flex:1;line-height:1.35;}
  .mini-status{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.04em;color:#dfe4ea;
    white-space:nowrap;display:flex;gap:14px;align-items:center;}
  .mini-status .mv{color:#c9a24e;font-weight:700;}
  .mini-status .mtime{color:#e0a58f;font-weight:700;min-width:52px;text-align:right;}
  .mini-quit{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;
    padding:5px 11px;background:transparent;color:#8b94a6;border:1px solid #3a4152;border-radius:6px;cursor:pointer;}
  .mini-quit:hover{color:#e0a58f;border-color:#e0a58f;}
  .mini-area{flex:1;position:relative;overflow:hidden;}

  /* SIEM */
  .siem-item{position:absolute;font-size:46px;cursor:grab;user-select:none;line-height:1;
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.5));transition:transform .12s;touch-action:none;z-index:3;}
  .siem-item:active{cursor:grabbing;}
  .siem-bin{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);text-align:center;
    font-size:52px;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));}
  .siem-bin .lbl{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8b94a6;margin-top:2px;}
  .siem-bin.over{transform:translateX(-50%) scale(1.12);}
  .siem-tools{position:absolute;left:16px;top:16px;display:flex;flex-direction:column;gap:12px;z-index:4;}
  .siem-tool{font-size:40px;line-height:1;cursor:pointer;padding:8px;border-radius:10px;border:2px solid transparent;
    background:rgba(255,255,255,.03);text-align:center;transition:border-color .12s,background .12s;}
  .siem-tool .lbl{display:block;font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.1em;
    text-transform:uppercase;color:#8b94a6;}
  .siem-tool.sel{border-color:#c9a24e;background:rgba(201,162,78,.14);}
  .siem-legend{position:absolute;right:16px;top:16px;font-size:12px;color:#8b94a6;line-height:1.7;text-align:right;z-index:2;}
  .siem-flash{position:absolute;inset:0;background:#b0524f;opacity:0;pointer-events:none;z-index:9;}

  /* server grid */
  .grid16{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
    gap:12px;padding:26px;}
  .g16-cell{background:#0a0c12;border:1px solid #2c3140;border-radius:8px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:52px;transition:transform .1s,background .15s;}
  .g16-cell:hover{background:#141824;}
  .g16-cell.open{cursor:default;background:#1a1e2b;}
  .g16-cell.buff{background:rgba(95,125,106,.25);border-color:#5f7d6a;}

  /* word search */
  .wordgrid{position:absolute;inset:0;display:flex;flex-direction:column;padding:22px;gap:6px;}
  .wg-row{flex:1;display:flex;align-items:center;justify-content:center;gap:clamp(6px,1.6vw,20px);
    font-family:'Courier New',monospace;font-size:clamp(18px,3.4vh,30px);font-weight:700;letter-spacing:.14em;
    color:#c7cedb;background:#0c0e15;border:1px solid #232838;border-radius:7px;cursor:pointer;
    transition:background .1s,border-color .1s;}
  .wg-row:hover{background:#161a26;border-color:#3a4152;}
  .wg-row.good{background:rgba(95,125,106,.4);border-color:#5f7d6a;}
  .wg-row.bad{background:rgba(176,82,79,.4);border-color:#b0524f;}

  /* smash */
  .mini-area.smash{cursor:none;background:radial-gradient(circle at 50% 40%,#1a1e2b,#0c0e15);}
  .smash-hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:64px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));}
  .smash-pc{position:absolute;transform:translate(-50%,-50%);font-size:52px;cursor:none;user-select:none;
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.5));transition:transform .05s;}
  .smash-pc .hp{position:absolute;left:50%;bottom:-14px;transform:translateX(-50%);width:52px;height:6px;
    background:#2c3140;border-radius:3px;overflow:hidden;}
  .smash-pc .hp i{display:block;height:100%;background:#5f7d6a;transition:width .08s;}
  .smash-link{position:absolute;height:2px;background:linear-gradient(90deg,#3a4152,#c9a24e);transform-origin:0 50%;opacity:.5;z-index:0;}
  .smash-pc,.smash-hub{z-index:2;}
  .hammer{position:fixed;font-size:40px;pointer-events:none;z-index:60;transform:translate(-30%,-70%) rotate(0deg);transition:transform .06s;}
  .hammer.whack{transform:translate(-30%,-70%) rotate(-55deg);}

  /* crisis */
  .crisis-wrap{position:absolute;inset:0;display:flex;flex-direction:column;padding:22px;gap:12px;}
  .crisis-reqs{display:flex;gap:18px;flex-wrap:wrap;font-size:13.5px;}
  .crisis-req{display:flex;align-items:center;gap:7px;color:#8b94a6;}
  .crisis-req .bx{width:18px;height:18px;border:1.5px solid #3a4152;border-radius:5px;display:inline-flex;
    align-items:center;justify-content:center;font-size:12px;color:transparent;}
  .crisis-req.ok{color:#8fb39a;}
  .crisis-req.ok .bx{background:#5f7d6a;border-color:#5f7d6a;color:#fff;}
  .crisis-ta{flex:1;resize:none;background:#0c0e15;border:1px solid #2c3140;border-radius:8px;color:#dfe4ea;
    font-family:'Lora',serif;font-size:16px;line-height:1.6;padding:14px 16px;}
  .crisis-ta:focus{outline:none;border-color:#c9a24e;}
  .crisis-foot{display:flex;align-items:center;justify-content:space-between;gap:14px;}
  .crisis-count{font-size:13px;color:#8b94a6;}
  .crisis-count b{color:#c9a24e;}
  .mini-btn{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;letter-spacing:.05em;
    padding:10px 22px;background:#c9a24e;color:#241a08;border:none;border-radius:8px;cursor:pointer;}
  .mini-btn:hover{background:#d8b463;}
  .mini-btn:disabled{opacity:.4;cursor:default;}
</style>
</head>
<body>
<div id="hud">
  <div>
    <h1>The Office Tower</h1>
  </div>
  <div class="spacer"></div>
  <div class="status">
    <div class="stat" id="agentStat">Agent 1/1</div>
    <div class="stat" id="buffStat"></div>
    <div class="stat">Turn <b id="turnNum">1</b>/<span id="turnMax">10</span></div>
    <div class="stat" id="streakStat">Streak <b id="streakDots">○○○</b></div>
    <div id="chainpips"></div>
    <button class="topbtn" id="caseBtn">Case File</button>
    <div id="menuWrap">
      <button class="topbtn" id="hamBtn" aria-label="Menu">☰</button>
      <div id="hamMenu">
        <button data-menu="restart">↻ Restart</button>
        <button data-menu="controls">⌘ Controls</button>
        <button data-menu="settings">⚙ Settings</button>
        <button data-menu="quit">◂ Main menu</button>
      </div>
    </div>

<script type="module">
import * as E from './engine.js';
import * as D from './game-data.js';

/* =====================================================================
   CANVAS PLATFORMER
   ===================================================================== */
const canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');

const C = {
  bg:'#f3f2f2', ink:'#201f1d', accent:'#b68235', accentDeep:'#8a5f22',
  paper:'#faf9f7', wall:'#efedea', slab:'#3a3733', slabLite:'#57534c',
  line:'#d9d5cf', mute:'#8a857e', dark:'#26241f', salmon:'#b0524f',
  skin:'#e8c39e', skin2:'#c68d5e', skin3:'#8a5a3b',
  shirtA:'#7d8a99', shirtB:'#9a7d5e', shirtC:'#6f7d6a', shirtD:'#8a6a7d',
  screen:'#cfe0d8', screenGlow:'#e9f2ee'
};

const PLAYER_COLORS = ['#b0342f', '#3a5f8a', '#c99a2e'];
const PLAYER_COLORS_DEEP = ['#7e2320', '#28405e', '#8f6c1c'];

const W = 1920, H = 1120;
const FLOOR_H = 196, SLAB = 18;
const BX = 150, BW = 1620;
const GROUND_Y = 1050;
const floorY = i => GROUND_Y - i*FLOOR_H;
const ROOF_Y = floorY(4) - (FLOOR_H - SLAB) - SLAB;

const FLOORS = [
  {name:'INFOSEC', num:'01'}, {name:'IT', num:'02'}, {name:'', num:'03'},
  {name:'FINANCE', num:'04'}, {name:'EXECUTIVE', num:'05'},
];

const LADDERS = [ {x:BX+BW-90,f:0}, {x:BX+70,f:1}, {x:BX+BW-90,f:2}, {x:BX+70,f:3} ];
const LADDER_W = 34;

let numPlayers = 1;   // set by intro

function rect(x,y,w,h,fill,stroke){
  if(fill){ctx.fillStyle=fill;ctx.fillRect(x,y,w,h);}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.strokeRect(x+.5,y+.5,w-1,h-1);}
}
function line(x1,y1,x2,y2,col,w){
  ctx.strokeStyle=col||C.line;ctx.lineWidth=w||1;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
}
function ctext(str,x,y,size,opt={}){
  ctx.fillStyle=opt.color||C.ink;
  ctx.font=`${opt.italic?'italic ':''}${opt.weight||400} ${size}px ${opt.body?"'Lora'":"'Cormorant Garamond'"}, Georgia, serif`;
  ctx.textAlign=opt.align||'left';
  if(opt.spacing){ctx.save();ctx.letterSpacing=opt.spacing;ctx.fillText(str,x,y);ctx.restore();}
  else ctx.fillText(str,x,y);
  ctx.textAlign='left';
}

const ENTITIES = [];
function registerEntity(type, x, y, w){
  const floor = Math.round((GROUND_Y - y)/FLOOR_H);
  const key = type+':'+x+':'+floor;
  let e = ENTITIES.find(e=>e.key===key);
  if(!e){ e = {key, type, x, y, w, floor, id: ENTITIES.length}; ENTITIES.push(e); }
  return e;
}

function desk(x,y,facing=1){
  const dw=110, dh=46;
  rect(x, y-dh-4, dw, 6, C.dark);
  line(x+6, y-dh+2, x+6, y, C.dark, 3);
  line(x+dw-6, y-dh+2, x+dw-6, y, C.dark, 3);
  const mx = facing===1 ? x+dw-46 : x+8;
  rect(mx, y-dh-34, 38, 26, C.dark);
  rect(mx+3, y-dh-31, 32, 20, C.screen);
  ctx.fillStyle=C.screenGlow; ctx.fillRect(mx+5, y-dh-29, 12, 4);
  line(mx+19, y-dh-8, mx+19, y-dh-4, C.dark, 3);
  rect(mx+12, y-dh-5, 14, 2, C.dark);
  rect(facing===1? x+30: x+52, y-dh-6, 26, 3, C.mute);
}
function person(x,y,shirt,skin,seated=true){
  if(seated){
    rect(x-12, y-34, 24, 4, C.dark);
    line(x, y-30, x, y-8, C.dark, 3);
    line(x-10, y-8, x+10, y-8, C.dark, 3);
    line(x-10, y-8, x-10, y, C.dark, 2); line(x+10, y-8, x+10, y, C.dark, 2);
    rect(x-14, y-58, 5, 30, C.dark);
    rect(x-8, y-56, 16, 24, shirt);
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(x, y-64, 8, 0, 7); ctx.fill();
    line(x+6, y-50, x+22, y-44, shirt, 4);
    line(x-4, y-33, x-4, y-14, C.slab, 4);
  } else {
    rect(x-8, y-52, 16, 30, shirt);
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(x, y-60, 8, 0, 7); ctx.fill();
    line(x-4, y-22, x-4, y, C.slab, 4);
    line(x+4, y-22, x+4, y, C.slab, 4);
  }
}
function workstation(x,y,shirt,skin){ desk(x,y,1); person(x-8,y,shirt,skin); registerEntity('userdesk', x, y, 110); }
function terminal(x,y){ desk(x,y,1); registerEntity('terminal', x, y, 110); }

function fridge(x,y){
  rect(x, y-96, 52, 96, C.paper, C.ink);
  line(x, y-62, x+52, y-62, C.ink, 1.5);
  line(x+42, y-88, x+42, y-70, C.ink, 2.5);

}
function coffeeTable(x,y){

}
function serverRack(x,y,h=110){
  rect(x, y-h, 46, h, C.dark);
  for(let i=0;i<Math.floor(h/18);i++){

    ctx.fillStyle = i%2? C.accent : '#5f8a6a';

}
function plant(x,y,s=1){

  for(const a of [-0.5,-0.15,0.2,0.55]){
    ctx.beginPath(); ctx.moveTo(x, y-14*s);
    ctx.quadraticCurveTo(x+a*36*s, y-34*s, x+a*52*s, y-52*s); ctx.stroke();

}
function poster(x,y,label,glyph){

function filingCabinet(x,y){

function safeBox(x,y){

function bookshelf(x,y){
  rect(x, y-118, 86, 118, C.paper, C.ink);
  for(let s=0;s<3;s++){
    const sy=y-118+8+s*36;
    line(x, sy+30, x+86, sy+30, C.ink, 1.2);

function ladder(x, ytop, ybot){

function drawFloorRoom(i){

function drawBuilding(){
  rect(0,0,W,H,C.bg);
  line(0, GROUND_Y+SLAB, W, GROUND_Y+SLAB, C.ink, 2);
  rect(0, GROUND_Y+SLAB, W, H-GROUND_Y-SLAB, '#e7e4df');
  for(let i=0;i<5;i++) drawFloorRoom(i);
  for(let i=0;i<5;i++) rect(BX-14, floorY(i), BW+28, SLAB, C.slab);
  rect(BX-14, ROOF_Y, BW+28, SLAB, C.slab);
  rect(BX+BW/2-190, ROOF_Y-54, 380, 54, C.paper, C.ink);
  ctext('THE OFFICE TOWER', BX+BW/2, ROOF_Y-20, 30, {align:'center', weight:600, spacing:'0.14em'});
  line(BX-14, ROOF_Y, BX-14, GROUND_Y+SLAB, C.slab, 6);
  line(BX+BW+14, ROOF_Y, BX+BW+14, GROUND_Y+SLAB, C.slab, 6);
  for(const L of LADDERS){ ladder(L.x, floorY(L.f+1)+SLAB, floorY(L.f)); }

  // Floor 1 — InfoSec + breakroom
  {
    const y = floorY(0);
    const bwx = BX+BW-560;
    line(bwx, y-(FLOOR_H-SLAB)+16, bwx, y, C.line, 2);
    ctext('BREAKROOM', bwx+24, y-(FLOOR_H-SLAB)+44, 18, {spacing:'0.2em', color:C.mute, weight:600});
    fridge(bwx+40, y);
    coffeeTable(bwx+140, y);
    plant(bwx+280, y, 1);
    person(bwx+330, y, C.shirtD, C.skin2, false);
    terminal(BX+320, y);
    // InfoSec staff; extra players displace them (2nd -> middle desk, 3rd -> CISO)
    const infosec = [
      {x:BX+500, shirt:C.shirtC, skin:C.skin3, removeAt:2, ciso:false},
      {x:BX+680, shirt:C.shirtB, skin:C.skin2, removeAt:3, ciso:true},
    ];
    for(const d of infosec){
      desk(d.x, y, 1);
      const removed = numPlayers >= d.removeAt;
      if(!removed) person(d.x-8, y, d.shirt, d.skin);
      const e = registerEntity('userdesk', d.x, y, 110);
      e.ciso = d.ciso && !removed;
      e.playerHome = removed;
    }
    serverRack(BX+120, y, 118);
    lockPoster(BX+880, y-(FLOOR_H-SLAB)+34);
    ctext('SOC MONITORING', BX+320, y-108, 13, {body:true, italic:true, color:C.mute});
  }

  // Floor 2 — IT
  {
    const y = floorY(1);
    workstation(BX+260, y, C.shirtB, C.skin3);
    workstation(BX+440, y, C.shirtA, C.skin2);
    workstation(BX+620, y, C.shirtD, C.skin);
    serverRack(BX+840, y, 100);
    serverRack(BX+900, y, 118);
    printer(BX+1030, y);
    ctx.strokeStyle=C.mute; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(BX+960, y-8);
    ctx.bezierCurveTo(BX+1000,y-40,BX+960,y-60,BX+1010,y-30); ctx.stroke();
    { const px=BX+1180, py=y-(FLOOR_H-SLAB)+34, pw=112, ph=96;
      rect(px, py, pw, ph, C.paper, C.ink);
      ctext('⟳', px+pw/2, py+48, 34, {align:'center', color:C.accent});
      line(px+16, py+62, px+pw-16, py+62, C.line, 1);
      ctext('HAVE YOU TRIED', px+pw/2, py+78, 11.5, {align:'center', body:true, color:C.mute});
      ctext('REBOOTING IT?', px+pw/2, py+90, 11.5, {align:'center', body:true, color:C.mute}); }
  }

  // Floor 3 — HR & Marketing
  {
    const y = floorY(2);
    const mid = BX + BW/2;
    ctext('HR', BX+120, y-(FLOOR_H-SLAB)+52, 22, {weight:600, spacing:'0.16em', color:C.slab});
    workstation(BX+220, y, C.shirtC, C.skin);
    workstation(BX+400, y, C.shirtD, C.skin2);
    workstation(BX+580, y, C.shirtA, C.skin3);
    poster(BX+120, y-84, 'BE KIND', '♥');
    plant(BX+700, y, 1.1);
    line(mid, y-(FLOOR_H-SLAB)+16, mid, y, C.line, 2);
    ctext('MARKETING', mid+40, y-(FLOOR_H-SLAB)+52, 22, {weight:600, spacing:'0.16em', color:C.slab});
    workstation(mid+130, y, C.shirtB, C.skin3);
    workstation(mid+310, y, C.shirtA, C.skin);
    whiteboard(mid+470, y-(FLOOR_H-SLAB)+34);
    ctext('Q3 CAMPAIGN', mid+470+65, y-(FLOOR_H-SLAB)+34+92, 12, {align:'center', body:true, color:C.mute});

  // Floor 4 — Finance

const mapCanvas = document.createElement('canvas');
mapCanvas.width = W; mapCanvas.height = H;

/* ---- players ---- */
function makeChar(x, floor){ return {x, y:floorY(floor), vx:0, vy:0, w:22, h:52, onGround:true, onLadder:false, face:1}; }
let players = [ makeChar(BX+220,0) ];
let active = 0;
let player = players[0];

const keys = {};
addEventListener('keydown', e=>{
  if(e.key==='Tab'){ e.preventDefault(); if(!modalOpen && players.length>1){ active=(active+1)%players.length; player=players[active]; target=null; refreshHUD(); } return; }
  if(e.key==='e'||e.key==='E'){ tryInteract(); return; }
  if(modalOpen) return;
  keys[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) target=null;
  if(['ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
addEventListener('keyup', e=>keys[e.key]=false);

let target = null;

function viewTransform(){
  const scale = Math.min(canvas.width/W, canvas.height/H);
  return {scale, ox:(canvas.width-W*scale)/2, oy:(canvas.height-H*scale)/2};
}
function toWorld(e){
  const r = canvas.getBoundingClientRect();
  const {scale, ox, oy} = viewTransform();
  return { x:((e.clientX-r.left)*devicePixelRatio-ox)/scale, y:((e.clientY-r.top)*devicePixelRatio-oy)/scale };
}
function entityAt(wx, wy){
  for(const d of ENTITIES){
    if(wx >= d.x-18 && wx <= d.x+d.w+18 && wy >= d.y-124 && wy <= d.y+8) return d;
  }
  return null;
}
function playerHitTest(wx, wy){
  for(let i=0;i<players.length;i++){ const c=players[i]; if(wx>=c.x-18 && wx<=c.x+18 && wy>=c.y-66 && wy<=c.y+6) return i; }
  return -1;
}
canvas.addEventListener('click', e=>{
  if(modalOpen) return;
  const p = toWorld(e);
  const hp = playerHitTest(p.x, p.y);
  if(hp>=0){ active=hp; player=players[active]; target=null; refreshHUD(); return; }
  const d = entityAt(p.x, p.y);
  if(d) target = {x: d.x + d.w/2, floor: d.floor, entity: d};
});
canvas.addEventListener('mousemove', e=>{
  if(modalOpen){ canvas.style.cursor='default'; return; }
  const p = toWorld(e);
  canvas.style.cursor = (playerHitTest(p.x,p.y)>=0 || entityAt(p.x,p.y)) ? 'pointer' : 'default';
});

function playerFloor(){ return Math.max(0, Math.min(4, Math.round((GROUND_Y - player.y)/FLOOR_H))); }

function autoIntent(){
  const a = {left:false,right:false,up:false,down:false};
  if(!target) return a;
  const pf = playerFloor();
  if(player.onLadder){
    if(player.y > floorY(target.floor)) a.up = true;
    else if(player.y < floorY(target.floor)) a.down = true;
    return a;
  }
  if(pf === target.floor && player.onGround){
    const dx = target.x - player.x;
    if(Math.abs(dx) <= 6){ const ent=target.entity; target=null; if(ent) openEntity(ent); return a; }
    if(dx < 0) a.left = true; else a.right = true;
    return a;
  }
  const L = target.floor > pf ? LADDERS[pf] : LADDERS[pf-1];
  if(!L){ target = null; return a; }
  const cx = L.x + LADDER_W/2;
  const dx = cx - player.x;
  if(Math.abs(dx) > 6){ if(dx < 0) a.left = true; else a.right = true; }
  else { if(target.floor > pf) a.up = true; else a.down = true; }
  return a;
}

function ladderAt(px, py){
  for(const L of LADDERS){
    const ytop = floorY(L.f+1), ybot = floorY(L.f);
    if(px > L.x-6 && px < L.x+LADDER_W+6 && py > ytop-4 && py <= ybot+4) return L;
  }
  return null;
}

function updatePlayer(dt){
  if(modalOpen) return;
  const boost = 1 + 0.25*((game && game.coffeeCups)||0);
  const SPEED=340*boost, JUMP=560, GRAV=1500, CLIMB=220*boost;
  const auto = autoIntent();
  const inLeft = keys['ArrowLeft']||auto.left,  inRight = keys['ArrowRight']||auto.right;
  const inUp   = keys['ArrowUp']||auto.up,      inDown  = keys['ArrowDown']||auto.down;
  const L = ladderAt(player.x, player.y);
  if(L && (inUp||inDown)) player.onLadder=true;
  if(!L) player.onLadder=false;
  if(player.onLadder){
    player.vy=0; player.vx=0;
    if(inUp)   player.y -= CLIMB*dt;
    if(inDown) player.y += CLIMB*dt;
    if(inLeft) {player.x -= SPEED*.6*dt; player.onLadder=false;}
    if(inRight){player.x += SPEED*.6*dt; player.onLadder=false;}
    const ytop = floorY(L?L.f+1:0), ybot = floorY(L?L.f:0);
    if(L){
      if(player.y <= ytop){ player.y = ytop; player.onLadder=false; player.onGround=true; }
      if(player.y >= ybot){ player.y = ybot; player.onLadder=false; player.onGround=true; }
    }
  } else {
    player.vx = 0;
    if(inLeft)  {player.vx=-SPEED; player.face=-1;}
    if(inRight) {player.vx= SPEED; player.face=1;}
    if((keys['ArrowUp']||keys[' ']) && player.onGround){ player.vy=-JUMP; player.onGround=false; }
    player.vy += GRAV*dt;
    player.x += player.vx*dt;
    player.y += player.vy*dt;
    player.onGround=false;
    for(let i=0;i<5;i++){
      const fy = floorY(i);
      if(player.vy>=0 && player.y>=fy && player.y<=fy+30){ player.y=fy; player.vy=0; player.onGround=true; break; }
    }
    const ceil = (()=>{
      for(let i=0;i<5;i++){ const fy=floorY(i); if(player.y<=fy && player.y>fy-FLOOR_H) return fy-(FLOOR_H-SLAB); }
      return ROOF_Y+SLAB;
    })();
    if(player.y-player.h-14 < ceil){ player.y = ceil+player.h+14; if(player.vy<0) player.vy=0; }
  }
  player.x = Math.max(BX+14, Math.min(BX+BW-14, player.x));
  player.y = Math.min(player.y, GROUND_Y);
}

function drawChar(g, p, isActive, idx){
  const {x,y,face}=p;
  const body = PLAYER_COLORS[idx % PLAYER_COLORS.length];
  const bodyEdge = PLAYER_COLORS_DEEP[idx % PLAYER_COLORS_DEEP.length];
  g.strokeStyle=C.slab; g.lineWidth=5;
  g.beginPath(); g.moveTo(x-5,y-22); g.lineTo(x-6,y); g.stroke();
  g.beginPath(); g.moveTo(x+5,y-22); g.lineTo(x+6,y); g.stroke();
  g.fillStyle=body; g.fillRect(x-9, y-50, 18, 30);
  g.strokeStyle=bodyEdge; g.lineWidth=1.5; g.strokeRect(x-9.5,y-50.5,19,31);
  g.strokeStyle=bodyEdge; g.lineWidth=4;
  g.beginPath(); g.moveTo(x, y-44); g.lineTo(x+10*face, y-32); g.stroke();
  g.fillStyle=C.skin; g.beginPath(); g.arc(x, y-59, 9, 0, 7); g.fill();
  g.strokeStyle=C.ink; g.lineWidth=1; g.stroke();
  g.fillStyle=C.paper; g.fillRect(x-4+3*face, y-46, 6, 8);
  if(isActive && players.length>1){
    const ay = y-88 + Math.sin(performance.now()/300)*3;
    g.fillStyle=C.accent;
    g.beginPath(); g.moveTo(x, ay+8); g.lineTo(x-6, ay); g.lineTo(x+6, ay); g.closePath(); g.fill();
  }
}

function drawEntityMarker(g, e, hot){
  const cx = e.x + e.w/2;
  const my = e.y - (e.type==='rack'?134:e.type==='exec'?96:114) + Math.sin(performance.now()/600 + e.id)*3;
  const isCaller = caller && e.key===caller.key;
  if(!settings.markers && !hot && !isCaller && !e.ciso) return;
  g.save();
  if(hot){
    g.strokeStyle=C.accent; g.lineWidth=2; g.setLineDash([6,4]);
    const bh = e.type==='rack'?122:e.type==='exec'?60:100;
    g.strokeRect(e.x-10, e.y-bh, e.w+20, bh+6);
    g.setLineDash([]);
  }
  g.fillStyle = isCaller ? C.salmon : e.ciso ? C.accentDeep : 'rgba(182,130,53,0.85)';
  g.beginPath(); g.moveTo(cx,my-7); g.lineTo(cx-6,my); g.lineTo(cx,my+7); g.lineTo(cx+6,my); g.closePath(); g.fill();
  if(e.ciso){ g.fillStyle=C.accentDeep; g.font="700 13px 'Cormorant Garamond', serif"; g.textAlign='center'; g.fillText('CISO', cx, my-14); g.textAlign='left'; }
  g.restore();
}
function drawCaller(g){
  if(!caller) return;
  const e = callerEntity(); if(!e) return;
  const cx = e.x + e.w/2;
  const by = e.y - 118 + Math.sin(performance.now()/380)*5;
  g.fillStyle=C.salmon;
  g.beginPath(); g.arc(cx, by, 15, 0, 7); g.fill();
  g.beginPath(); g.moveTo(cx-6, by+12); g.lineTo(cx+6, by+12); g.lineTo(cx, by+22); g.closePath(); g.fill();
  g.fillStyle='#fff'; g.font="700 16px 'Cormorant Garamond', serif"; g.textAlign='center'; g.textBaseline='middle';
  g.fillText('☎', cx, by+1);
  g.textAlign='left'; g.textBaseline='alphabetic';
}

let last=performance.now();
let nearEntity=null;
let mapDrawn=false;
function drawScene(){
  const real = ctx;
  ctx = mapCanvas.getContext('2d');
  ENTITIES.length = 0;
  drawBuilding();
  ctx = real;
  mapDrawn=true;
}
function frame(now){
  const dt=Math.min((now-last)/1000, .033); last=now;
  updatePlayer(dt);

  nearEntity=null;
  if(!modalOpen && game && !game.result && player.onGround){
    const pf=playerFloor(); let best=1e9;
    for(const e of ENTITIES){
      if(e.floor!==pf) continue;
      const d=Math.abs(player.x-(e.x+e.w/2));
      if(d<78 && d<best){ best=d; nearEntity=e; }
    }
  }

  const g = canvas.getContext('2d');
  const scale = Math.min(canvas.width/W, canvas.height/H);
  g.setTransform(1,0,0,1,0,0);
  g.fillStyle=C.bg; g.fillRect(0,0,canvas.width,canvas.height);
  g.setTransform(scale,0,0,scale,(canvas.width-W*scale)/2,(canvas.height-H*scale)/2);
  if(mapDrawn) g.drawImage(mapCanvas,0,0);
  for(const e of ENTITIES) drawEntityMarker(g, e, e===nearEntity);
  drawCaller(g);
  if(target){
    const t = performance.now()/500;
    const mx = target.entity.x + target.entity.w/2, my = target.entity.y - 96 - 8 + Math.sin(t*2)*4;
    g.fillStyle=C.accent;
    g.beginPath(); g.moveTo(mx, my); g.lineTo(mx-8, my-12); g.lineTo(mx+8, my-12); g.closePath(); g.fill();
  }
  for(let i=0;i<players.length;i++) drawChar(g, players[i], i===active, i);

  updateFloatingUI();
  requestAnimationFrame(frame);
}

/* ---------- lifecycle ---------- */
function newGame(n){
  numPlayers = Math.max(1, Math.min(3, n || numPlayers || 1));
  drawScene();                          // rebuild map + entities for this player count
  game = E.createGame();
  game.coffeeCups = 0; game.coffeeThisTurn = false; game.fridgeUsed = false; game.cisoAsked = false;
  players = [ makeChar(BX+220, 0) ];
  if(numPlayers>=2) players.push(makeChar(BX+500, 0));
  if(numPlayers>=3) players.push(makeChar(BX+680, 0));
  active = 0; player = players[0]; target = null;
  const pool = ENTITIES.filter(e=>e.type==='userdesk' && e.floor>0);
  const ce = pool[Math.floor(Math.random()*pool.length)] || ENTITIES.find(e=>e.type==='userdesk');
  caller = { key: ce.key, name: rand(NAMES), dept: deptFor(ce), inquired:false };
  game.log = [{ t:0, text:`${caller.name} (${caller.dept}) called in an incident.` }];
  try{ localStorage.setItem('socc_last_mode','office'); }catch(e){}
  save(); refreshHUD(); showCall();
}
function save(){
  try{ if(game) localStorage.setItem(SAVE_KEY, JSON.stringify({ game, caller, numPlayers, players, active })); }catch(e){}
}
function clearSave(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
function loadGame(){
  try{
    const sv = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(sv && sv.game && sv.caller){
      numPlayers = sv.numPlayers || 1;
      drawScene();
      if(!ENTITIES.some(e=>e.key===sv.caller.key)) return false;
      game = sv.game; caller = sv.caller;
      players = (sv.players && sv.players.length) ? sv.players : [ makeChar(BX+220,0) ];
      active = sv.active || 0; if(active>=players.length) active=0; player = players[active];
      try{ localStorage.setItem('socc_last_mode','office'); }catch(e){}
      refreshHUD(); return true;
    }
  }catch(e){}
  return false;
}

/* ---------- entity panel ---------- */
function openEntity(e){
  if(game.result) return;
  if(e.type==='coffee'){ openCoffee(); return; }
  if(e.type==='fridge'){ openFridge(); return; }

  const isCaller = caller && e.key===caller.key;
  const procs = ENTITY_PROCS[e.type] || [];
  const label = isCaller ? `${caller.name}'s Desk` : e.ciso ? "CISO's Desk" : ENTITY_LABEL[e.type];
  const kicker = isCaller ? `${caller.dept} · the caller` : e.ciso ? 'Chief Information Security Officer' : ENTITY_KICKER[e.type];

  let extra = '';
  if(isCaller){
    const oc = initialCall();
    if(caller.inquired) extra = `<div class="aside"><b>${esc(caller.name)} says:</b> “${esc(oc.symptom)}”</div>`;
    else extra = `<div class="m-actions" style="margin-top:8px"><button class="btn" data-act="inquire">Inquire about the problem</button></div>`;
  } else if(e.ciso){
    if(game.cisoAsked){
      const clue = cisoClue();
      extra = `<div class="aside"><b>The CISO leans over:</b> ${clue ? `“For what you're seeing, I'd start with <b>${esc(clue)}</b>.”` : `“You've traced the whole chain — go contain it.”`}</div>`;
    } else {
      extra = `<div class="m-actions" style="margin-top:8px"><button class="btn" data-act="ciso">Ask the CISO for a clue</button></div>`;
    }
  }

  let listHtml;
  if(game.playedThisTurn){
    listHtml = `<p class="field-note">Your team has already run a procedure this turn. End the turn to continue.</p>`;
  } else {
    listHtml = `<div class="proc-list">` + procs.map(pid=>{
      const p = E.cardById(pid);
      const removed = (game.removed||[]).includes(pid);
      const cd = game.cooldowns[pid]||0;
      const est = game.established.includes(pid);
      const disabled = removed || cd>0;
      let right;
      if(removed) right = `<span class="lock">✕ lost</span>`;
      else if(cd>0) right = `<span class="lock">cooldown ${cd}</span>`;
      else right = `<span class="pm ${est?'est':'no'}">${est?'+3':'+0'}</span>`;
      return `<button class="proc" data-proc="${pid}" ${disabled?'disabled':''}>
        <span><span class="pt">${esc(p.title)}</span><span class="pd">${esc(p.description)}</span></span>${right}</button>`;
    }).join('') + `</div>`;
  }

  closeableModal = true;
  setModal(`
    <div class="m-head"><span class="m-kicker">${esc(kicker)}</span>
      <button class="m-x" data-act="close">✕</button></div>
    <div class="m-body">
      <p class="m-title sm">${esc(label)}</p>
      ${extra}
      <div class="subhead">${game.playedThisTurn?'&nbsp;':'Available procedures'}</div>
      ${listHtml}
    </div>`);
  bind(e);
}

function cisoClue(){
  for(const h of game.hidden){
    if(!h.revealed){ const c = E.cardById(h.cardId); const pid = (c.detection||[])[0]; if(pid) return E.cardById(pid).title; }

  return null;
}

/* ---- SIEM ---- */
function miniSiem(api){
  const NEED = 8, MAX_STRIKES = 3, TIME = 45000;
  let cleared = 0, strikes = 0, tool = null, current = null, ended = false;
  const start = performance.now();
  const KINDS = [
    { e:'📧', act:'trash' }, { e:'🐟', act:'trash' },
    { e:'🦠', act:'purge' }, { e:'🍪', act:'purge' },
    { e:'🔑', act:'reset' }, { e:'💻', act:'reset' },
  ];
  const ui = api.shell({ title:'SIEM Triage', areaClass:'siem',
    hint:'Trash email/fish · Purge (🧨) viruses/cookies · Reset (🔥) keys/machines',
    onAbort:()=>finish(false) });
  const area = ui.area;
  area.insertAdjacentHTML('beforeend', `
    <div class="siem-tools">
      <div class="siem-tool" data-tool="purge">🧨<span class="lbl">Purge</span></div>
      <div class="siem-tool" data-tool="reset">🔥<span class="lbl">Reset</span></div>
    </div>
    <div class="siem-legend">🗑️ email · fish<br>🧨 virus · cookie<br>🔥 key · machine</div>
    <div class="siem-bin" id="siemBin">🗑️<span class="lbl">Trash</span></div>`);
  const bin = area.querySelector('#siemBin');
  const tools = [...area.querySelectorAll('.siem-tool')];
  function selectTool(t){ tool = (tool===t)?null:t; tools.forEach(el=>el.classList.toggle('sel', el.dataset.tool===tool)); }
  tools.forEach(el=> el.onclick = ()=> selectTool(el.dataset.tool));
  function refresh(){ ui.setStatus(`<span>Cleared <span class="mv">${cleared}/${NEED}</span></span><span>Strikes <span class="mv" style="color:${strikes?'#e0a58f':'#c9a24e'}">${strikes}/${MAX_STRIKES}</span></span><span class="mtime" id="siemT"></span>`); }
  refresh();
  function resolve(ok){
    if(ok){ cleared++; } else { strikes++; ui.flash(); }
    if(current){ current.remove(); current=null; }
    refresh();
    if(cleared>=NEED) return finish(true);
    if(strikes>=MAX_STRIKES) return finish(false);
    spawn();
  }
  function spawn(){
    const k = KINDS[Math.floor(Math.random()*KINDS.length)];
    const el = document.createElement('div');
    el.className='siem-item'; el.textContent=k.e;
    const pad=70, w=area.clientWidth-pad*2, h=area.clientHeight-pad*2-90;
    el.style.left = (pad + Math.random()*w) + 'px';
    el.style.top  = (pad + Math.random()*h) + 'px';
    area.appendChild(el); current = el; el._kind = k;
    let dragging=false, dx=0, dy=0;
    el.addEventListener('pointerdown', ev=>{
      ev.preventDefault();
      if(tool){ // apply held tool
        const ok = (tool==='purge' && k.act==='purge') || (tool==='reset' && k.act==='reset');
        selectTool(tool); // deselect
        resolve(ok);
        return;
      }
      dragging=true; el.setPointerCapture(ev.pointerId);
      const r=el.getBoundingClientRect(); dx=ev.clientX-r.left-r.width/2; dy=ev.clientY-r.top-r.height/2;
    });
    el.addEventListener('pointermove', ev=>{
      if(!dragging) return;
      const ar=area.getBoundingClientRect();
      el.style.left=(ev.clientX-ar.left-dx-el.offsetWidth/2)+'px';
      el.style.top=(ev.clientY-ar.top-dy-el.offsetHeight/2)+'px';
      const br=bin.getBoundingClientRect();
      bin.classList.toggle('over', ev.clientX>br.left&&ev.clientX<br.right&&ev.clientY>br.top&&ev.clientY<br.bottom);
    });
    el.addEventListener('pointerup', ev=>{
      if(!dragging) return; dragging=false; bin.classList.remove('over');
      const br=bin.getBoundingClientRect();
      const onBin = ev.clientX>br.left&&ev.clientX<br.right&&ev.clientY>br.top&&ev.clientY<br.bottom;
      if(onBin) resolve(k.act==='trash');
    });
  }
  spawn();
  const tick = setInterval(()=>{
    const t = miniHost.querySelector('#siemT');
    const left = TIME-(performance.now()-start);
    if(t) t.textContent = fmtTime(left);
    if(left<=0) finish(false);
  }, 100);
  miniCleanup = ()=> clearInterval(tick);
  function finish(win){ if(ended) return; ended=true; clearInterval(tick); miniCleanup=null; api.done(win); }
}

/* ---- Word Search (firewall / netflow) ---- */
function miniWordSearch(api){
  const WORDS=['MALWARE','VIRUS','HACKER'];
  const word=WORDS[Math.floor(Math.random()*WORDS.length)];
  const ALPHA='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const COLS=8, ROWS=8, NEED=3, TIME=30000, HOLD=5000;
  let hits=0, targetRow=-1, ended=false, rows=[];
  const start=performance.now();
  const ui=api.shell({ title:'Log Scan', areaClass:'',
    hint:`Find "${word}" hiding in a row and click that row. It jumps every 5 seconds.`,
    onAbort:()=>finish(false) });
  const grid=document.createElement('div'); grid.className='wordgrid'; ui.area.appendChild(grid);
  for(let r=0;r<ROWS;r++){
    const row=document.createElement('div'); row.className='wg-row'; row.dataset.r=r;
    row.onclick=()=>{
      if(ended) return;
      if(r===targetRow){ hits++; row.classList.add('good'); refresh();
        if(hits>=NEED) return finish(true);
        setTimeout(()=>{ row.classList.remove('good'); place(); }, 180);
      } else { row.classList.add('bad'); setTimeout(()=>row.classList.remove('bad'),200); }
    };
    grid.appendChild(row); rows.push(row);
  }
  function rnd(n){ let s=''; for(let i=0;i<n;i++) s+=ALPHA[Math.floor(Math.random()*26)]; return s; }
  function fillRow(row, withWord){
    if(withWord){
      const off=Math.floor(Math.random()*(COLS-word.length+1));
      let chars=(rnd(off)+word+rnd(COLS-off-word.length)).split('');
      row.innerHTML=chars.map(c=>`<span>${c}</span>`).join('');
    } else {
      row.innerHTML=rnd(COLS).split('').map(c=>`<span>${c}</span>`).join('');
    }
  }
  function place(){
    targetRow=Math.floor(Math.random()*ROWS);
    rows.forEach((row,r)=>fillRow(row, r===targetRow));
    clearTimeout(placeTimer);
    placeTimer=setTimeout(place, HOLD);
  }
  function refresh(){ ui.setStatus(`<span>Found <span class="mv">${hits}/${NEED}</span></span><span class="mtime" id="wsT"></span>`); }
  let placeTimer=null; refresh(); place();
  const tick=setInterval(()=>{
    const left=TIME-(performance.now()-start);
    const t=miniHost.querySelector('#wsT'); if(t) t.textContent=fmtTime(left);
    if(left<=0) finish(false);
  },100);
  miniCleanup=()=>{ clearInterval(tick); clearTimeout(placeTimer); };
  function finish(win){ if(ended) return; ended=true; clearInterval(tick); clearTimeout(placeTimer); miniCleanup=null; api.done(win); }
}

/* ---- Isolation (smash) ---- */
function miniSmash(api){
  const TIME=20000, N=5; let smashed=0, ended=false;
  const ui=api.shell({ title:'Containment', areaClass:'smash',
    hint:'Your pointer is a hammer — click each machine until it shatters.',

  const pcs=[];
  const layout=[[26,26],[74,26],[18,74],[82,74],[50,86]];
  // draw links + machines once we know size
  requestAnimationFrame(()=>{
    const aw=area.clientWidth, ah=area.clientHeight, cx=aw/2, cy=ah/2;
    for(let i=0;i<N;i++){
      const px=layout[i][0]/100*aw, py=layout[i][1]/100*ah;
      const link=document.createElement('div'); link.className='smash-link';
      const dx=px-cx, dy=py-cy, len=Math.hypot(dx,dy), ang=Math.atan2(dy,dx)*180/Math.PI;

      const max=1+Math.floor(Math.random()*25); let hp=max;

      const fill=bar.querySelector('i'); fill.style.width='100%';
      pc.addEventListener('pointerdown', ev=>{
        ev.preventDefault(); if(pc._dead) return; whack();
        hp--; pc.style.transform='translate(-50%,-50%) scale(.9)';
        setTimeout(()=>{ if(!pc._dead) pc.style.transform='translate(-50%,-50%)'; },60);
        fill.style.width=(hp/max*100)+'%';
        if(hp<=0){ pc._dead=true; pc.textContent='💥'; bar.style.display='none';
          setTimeout(()=>pc.textContent='🧨',180); smashed++; refresh();

      });
      area.appendChild(pc); pcs.push(pc);

  const hammer=document.createElement('div'); hammer.className='hammer'; hammer.textContent='🔨'; miniHost.appendChild(hammer);
  function onMove(e){ hammer.style.left=e.clientX+'px'; hammer.style.top=e.clientY+'px'; }
  function whack(){ hammer.classList.add('whack'); setTimeout(()=>hammer.classList.remove('whack'),90); }
  window.addEventListener('pointermove', onMove);
  function refresh(){ ui.setStatus(`<span>Smashed <span class="mv">${smashed}/${N}</span></span><span class="mtime" id="smT"></span>`); }
  refresh();
  const start=performance.now();
  const tick=setInterval(()=>{
    const left=TIME-(performance.now()-start);
    const t=miniHost.querySelector('#smT'); if(t) t.textContent=fmtTime(left);
    if(left<=0) finish(false);
  },100);
  miniCleanup=()=>{ clearInterval(tick); window.removeEventListener('pointermove',onMove); hammer.remove(); };
  function finish(win){ if(ended) return; ended=true; clearInterval(tick); window.removeEventListener('pointermove',onMove); hammer.remove(); miniCleanup=null; api.done(win); }
}

function eventsToOverlays(events){
  const out=[];
  for(const e of events){
    if(e.kind==='fail') out.push({type:'fail'});
    if(e.kind==='noMatch') out.push({type:'noMatch'});
    if(e.kind==='reveal') out.push({type:'reveal', cardId:e.cardId});
    if(e.kind==='inject') out.push({type:'inject', cardId:e.cardId, trigger:e.trigger, detail:e.detail});
    if(e.kind==='turnSkipped') out.push({type:'skip', turn:e.turn});
  }
  return out;
}
function nextOverlay(){
  if(!ovQueue.length){ closeModal(); checkEnd(); return; }
  showOverlay(ovQueue.shift());
}
function showOverlay(o){
  closeableModal = false;
  let head, title, body='', aside='';
  if(o.type==='fail'){
    head='Nothing found'; title='The trail runs cold.';
    body=`The procedure came back empty this time. Fail streak: ${game.failStreak} of ${E.RULES.failStreakInject}.`;
    aside=`<div class="aside"><b>Talk it through:</b> why might this fail in real life? Budget? A tool nobody configured? Politics?</div>`;
  } else if(o.type==='noMatch'){
    head='Clean result'; title='The sweep came back clean.';
    body='Good news: the procedure works. Bad news: whatever is out there leaves no tracks this tool can see.';
  } else if(o.type==='reveal'){
    const c = E.cardById(o.cardId), cat = D.CATEGORIES[c.type];
    head = cat.label+' uncovered'; title=c.title; body=c.description;
    aside=`<div class="aside"><b>Kill chain:</b> ${game.hidden.filter(h=>h.revealed).length} of 4 stages confirmed.</div>`;
  } else if(o.type==='inject'){
    const c = E.cardById(o.cardId);
    head = 'Inject · '+o.trigger; title=c.title; body=c.description;
    if(o.detail) aside=`<div class="aside"><b>⚠</b> ${esc(o.detail)}</div>`;
  } else if(o.type==='skip'){
    head='Turn lost'; title=`Turn ${o.turn} is gone.`;
    body='Everyone ended up in a conference room instead. The attackers did not.';
  }
  setModal(`
    <div class="m-head"><span class="m-kicker">${esc(head)}</span></div>
    <div class="m-body">
      <p class="m-title sm">${esc(title)}</p>
      <p class="m-desc">${esc(body)}</p>
      ${aside}
      <div class="m-actions"><button class="btn primary" data-act="ovnext">Continue ▸</button></div>
    </div>`);
  bind();
}

function endTurn(){
  const events = E.endTurn(game);
  game.coffeeThisTurn = false;
  save();
  ovQueue = eventsToOverlays(events);
  if(ovQueue.length) nextOverlay();
  else { checkEnd(); refreshHUD(); }
}
function checkEnd(){
  if(game && game.result){ clearSave(); showDebrief(); }
  else refreshHUD();
}

function showDebrief(){
  const win = game.result==='win', pentest = game.result==='pentest';
  const title = win?'INCIDENT CONTAINED':pentest?'IT WAS A PENTEST':'BREACH COMPLETE';
  const color = win?'var(--green)':pentest?'var(--accentDeep)':'var(--salmon)';
  const sub = win ? `All four stages uncovered in ${Math.min(game.turn,E.RULES.turns)} turns.`
    : pentest ? 'You were never under attack — the CEO hired a red team. Here is how far they got.'
    : (game.loseReason || 'Time ran out.') + ' Here is the kill chain you were up against.';
  const slots = E.CAT_ORDER.map((cat,i)=>{
    const h=game.hidden[i], c=E.cardById(h.cardId), cc=D.CATEGORIES[cat];
    return `<div class="slot" style="border-color:${h.revealed?cc.color:'var(--divider)'}">
      <div class="sc" style="color:${cc.color}">${i+1}. ${esc(cc.label)} · ${h.revealed?'✓ FOUND':'✕ MISSED'}</div>
      <div class="st">${esc(c.title)}</div>
      <div class="ss">${esc(c.description)}</div></div>`;
  }).join('');
  closeableModal = false;
  setModal(`
    <div class="m-head"><span class="m-kicker" style="color:${color}">Debrief</span></div>
    <div class="m-body">
      <p class="m-title" style="color:${color}">${title}</p>
      <p class="m-desc">${esc(sub)}</p>
      <div class="subhead">The kill chain</div>
      ${slots}
      <div class="m-actions">
        <button class="btn primary" data-act="again">Play again</button>
        <button class="btn ghost" data-act="menu">Menu</button>
      </div>
    </div>`);
  bind();
}

function showCaseFile(){
  const oc = initialCall();
  const ce = callerEntity();
  const log = game.log.slice().reverse().map(l=>`<div class="le"><b>T${l.t}</b> ${esc(l.text)}</div>`).join('');
  closeableModal = true;
  setModal(`
    <div class="m-head"><span class="m-kicker">Case file · Turn ${Math.min(game.turn,E.RULES.turns)}/${E.RULES.turns}</span>
      <button class="m-x" data-act="close">✕</button></div>
    <div class="m-body">
      <div class="subhead">The call</div>
      <p class="m-desc">“${esc(oc.call)}”<br><span style="color:var(--mute);font-style:italic">— ${esc(caller.name)}, ${esc(caller.dept)} (${floorName(ce.floor)})</span></p>
      ${caller.inquired?`<div class="aside"><b>Symptom:</b> “${esc(oc.symptom)}”</div>`:`<p class="field-note">Visit ${esc(caller.name)}'s desk to inquire about symptoms.</p>`}
      <div class="subhead">Team &amp; buffs</div>
      <p class="m-desc" style="font-size:14px">Agents: ${players.length} · Coffee: ${game.coffeeCups||0}/4 (+${(game.coffeeCups||0)*25}% speed)${game.fridgeUsed?' · fridge used':''}${game.nextRollMod?` · next roll ${game.nextRollMod>0?'+':''}${game.nextRollMod}`:''}</p>
      <div class="subhead">Log</div>
      <div class="log">${log}</div>
    </div>`);
  bind();
}

function showControls(){
  closeableModal = true;
  const kb = isMobile ? '' : `
    <div class="subhead">Keyboard</div>
    <p class="m-desc" style="line-height:1.9">
      <b>← →</b> — move &nbsp;·&nbsp; <b>↑ / Space</b> — jump<br>
      <b>↑ ↓</b> on a ladder — climb<br>
      <b>Tab</b> — switch between agents<br>
      <b>E</b> — act at the highlighted desk, rack or person
    </p>`;
  setModal(`
    <div class="m-head"><span class="m-kicker">⌘ Controls</span><button class="m-x" data-act="close">✕</button></div>
    <div class="m-body">
      ${kb}
      <div class="subhead">${isMobile?'':'Pointer'}</div>
      <p class="m-desc" style="line-height:1.8">
        <b>Tap a desk, rack or person</b> to walk there — the action panel opens when you arrive.<br>
        <b>Tap another agent</b> to take control of them.
      </p>
      <div class="m-actions"><button class="btn primary" data-act="close">Got it ▸</button></div>
    </div>`);
  bind();
}

function showSettings(){
  closeableModal = true;
  const row = (key, label, desc)=>`<div class="toggle-row"><div><div class="tl">${label}</div><div class="td">${desc}</div></div>
    <div class="sw ${settings[key]?'on':''}" data-set="${key}" role="switch" aria-checked="${!!settings[key]}"></div></div>`;
  setModal(`
    <div class="m-head"><span class="m-kicker">⚙ Settings</span><button class="m-x" data-act="close">✕</button></div>
    <div class="m-body">
      ${row('fastDice','Fast dice','Skip the dice-roll animation and show the result immediately.')}
      ${row('miniGames','Mini-games','Replace the dice roll with a hands-on exercise for SIEM, server, log, isolation and crisis procedures. Clear the exercise to succeed; every other procedure still rolls a die.')}
      ${row('markers','Show markers','Draw the gold diamonds over interactable objects. The caller and CISO always show.')}
      <div class="m-actions"><button class="btn primary" data-act="close">Done ▸</button></div>
    </div>`);
  bind();
}

/* ---------- interaction / bindings ---------- */
function tryInteract(){
  if(modalOpen || !game || game.result) return;
  if(nearEntity) openEntity(nearEntity);
}
function menuQuit(){ window.location.href='index.html'; }

function bind(entity){
  modal.querySelectorAll('[data-act]').forEach(el=>{
    el.onclick = ()=>{
      const a = el.dataset.act;
      if(a==='close') closeModal();
      else if(a==='menu') menuQuit();
      else if(a==='inquire'){ caller.inquired=true; save(); openEntity(callerEntity()); }
      else if(a==='ciso'){ game.cisoAsked=true; save(); openEntity(entity); }
      else if(a==='drink'){ game.coffeeCups=(game.coffeeCups||0)+1; game.coffeeThisTurn=true; save(); refreshHUD(); infoModal('Breakroom','Caffeinated ☕',`Cup ${game.coffeeCups}/4 — movement speed is now +${game.coffeeCups*25}% for the rest of the game.`); }
      else if(a==='eat'){ game.nextRollMod=(game.nextRollMod||0)+3; game.fridgeUsed=true; save(); refreshHUD(); infoModal('Breakroom','Snack acquired 🥪','Your next roll carries a one-time +3 modifier.'); }
      else if(a==='dicecontinue') diceContinue();
      else if(a==='ovnext') nextOverlay();
      else if(a==='again'){ closeModal(); showIntro(); }
    };
  });
  modal.querySelectorAll('[data-set]').forEach(el=>{
    el.onclick = ()=>{ const k=el.dataset.set; settings[k]=!settings[k]; saveSettings(); showSettings(); };
  });
  modal.querySelectorAll('[data-players]').forEach(el=> el.onclick = ()=> newGame(parseInt(el.dataset.players,10)));
  modal.querySelectorAll('[data-mini]').forEach(el=> el.onclick = ()=> launchMinigame(el.dataset.mini));
  modal.querySelectorAll('[data-proc]').forEach(el=>{ if(el.disabled) return; el.onclick = ()=> showConfirm(entity, el.dataset.proc); });
  modal.querySelectorAll('[data-roll]').forEach(el=>{
    el.onclick = ()=>{ const inp = modal.querySelector('#manualVal'); const n = inp ? parseInt(inp.value,10) : NaN; runRoll(el.dataset.roll, (n>=1&&n<=20)?n:null); };
  });
  modal.querySelectorAll('[data-back]').forEach(el=>{
    el.onclick = ()=>{ const ent = ENTITIES.find(e=>e.key===el.dataset.back); if(ent) openEntity(ent); else closeModal(); };
  });
}

document.getElementById('caseBtn').onclick = ()=>{ if(game && !modalOpen) showCaseFile(); };
const hamMenu = document.getElementById('hamMenu');
document.getElementById('hamBtn').onclick = (e)=>{ e.stopPropagation(); hamMenu.classList.toggle('open'); };
document.addEventListener('click', ()=> hamMenu.classList.remove('open'));
hamMenu.querySelectorAll('[data-menu]').forEach(el=>{
  el.onclick = ()=>{
    hamMenu.classList.remove('open');
    const m = el.dataset.menu;
    if(m==='restart') showIntro();
    else if(m==='controls') showControls();
    else if(m==='settings') showSettings();
    else if(m==='quit') menuQuit();
  };
});
document.getElementById('kcHandle').onclick = ()=> document.getElementById('kcDrawer').classList.toggle('open');
endTurnBtn.onclick = ()=> endTurn();

/* ---------- HUD ---------- */
function refreshHUD(){
  if(!game) return;
  document.getElementById('turnNum').textContent = Math.min(game.turn, E.RULES.turns);
  document.getElementById('turnMax').textContent = E.RULES.turns;
  const fs = game.failStreak||0;
  document.getElementById('streakDots').textContent = '●'.repeat(fs)+'○'.repeat(Math.max(0,3-fs));
  document.getElementById('streakStat').style.color = fs>=2 ? 'var(--salmon)' : '';
  document.getElementById('agentStat').textContent = `Agent ${active+1}/${players.length}`;
  const cups = game.coffeeCups||0;
  let buff = cups>0 ? `☕ ${cups}/4` : '';
  if(game.nextRollMod) buff += (buff?' · ':'') + `⚡ ${game.nextRollMod>0?'+':''}${game.nextRollMod}`;
  document.getElementById('buffStat').textContent = buff;
  const pips = document.getElementById('chainpips'); pips.innerHTML='';
  E.CAT_ORDER.forEach((cat,i)=>{
    const h=game.hidden[i], cc=D.CATEGORIES[cat];
    const d=document.createElement('div'); d.className='pip';
    d.title = cc.label + (h.revealed?' — found':' — hidden');
    if(h.revealed){ d.style.background=cc.color; d.style.borderColor=cc.color; }
    pips.appendChild(d);
  });
  refreshKillChain();
}
function refreshKillChain(){
  if(!game) return;
  document.getElementById('kcCount').textContent = game.hidden.filter(h=>h.revealed).length;
  const wrap = document.getElementById('kcCards'); wrap.innerHTML='';
  E.CAT_ORDER.forEach((cat,i)=>{
    const h=game.hidden[i], cc=D.CATEGORIES[cat];
    const c = h.revealed ? E.cardById(h.cardId) : null;
    const card = document.createElement('div'); card.className='kc-card';
    if(c) card.style.borderColor = cc.color;
    card.innerHTML = `<div class="cc" style="color:${c?cc.color:'#a29c90'}"><span>${cc.icon}</span>${esc(cc.label)}</div>`
      + (c ? `<div class="kc-title">${esc(c.title)}</div><div class="kc-sub">✓ confirmed</div>`
           : `<div class="kc-dots">• • • • • •</div><div class="kc-sub">still hidden</div>`);
    wrap.appendChild(card);
  });
}
function updateFloatingUI(){
  if(nearEntity && !modalOpen && game && !game.result){
    const isCaller = caller && nearEntity.key===caller.key;
    const label = isCaller ? `${caller.name}'s Desk` : nearEntity.ciso ? "CISO's Desk" : ENTITY_LABEL[nearEntity.type];
    promptEl.style.display='flex';
    promptEl.innerHTML = (isMobile ? '' : `<span class="key">E</span> `) + `<span>${esc(label)}${isCaller?' · caller':''}</span>`;
  } else {
    promptEl.style.display='none';
  }
  endTurnBtn.style.display = (game && game.playedThisTurn && !game.result && !modalOpen) ? 'block' : 'none';
}

/* ---------- boot ---------- */
function boot(){ if(started) return; started=true; if(!loadGame()) showIntro(); }
document.fonts.ready.then(()=>{ drawScene(); refreshHUD(); if(!started) boot(); });
drawScene();
boot();
requestAnimationFrame(frame);
</script>
</body>
